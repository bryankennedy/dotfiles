# =============================================================================
# tmux configuration
# =============================================================================

# -----------------------------------------------------------------------------
# General
# -----------------------------------------------------------------------------

# Enable mouse support (clicking tabs, resizing panes)
set -g mouse on

# Increase scrollback buffer
set -g history-limit 10000

# Faster escape (important for vim/neovim)
set -sg escape-time 10

# Focus events for vim autoread
set -g focus-events on

# Renumber windows when one is closed
set -g renumber-windows on

# -----------------------------------------------------------------------------
# Display
# -----------------------------------------------------------------------------

# Fix colors for Ghostty
set -g default-terminal "screen-256color"
set -as terminal-features ",xterm-256color:RGB"

# Start window numbering at 1 (easier to reach keys)
set -g base-index 1
setw -g pane-base-index 1

# Set window title to current program
set -g set-titles on
set -g set-titles-string "#T"

# -----------------------------------------------------------------------------
# Key bindings
# -----------------------------------------------------------------------------

# Use Ctrl-a as prefix (easier than Ctrl-b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New windows open in current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with shift+arrow
bind -r S-Left  resize-pane -L 5
bind -r S-Right resize-pane -R 5
bind -r S-Up    resize-pane -U 5
bind -r S-Down  resize-pane -D 5

# Move windows left/right
bind < swap-window -t -1 \; select-window -t -1
bind > swap-window -t +1 \; select-window -t +1

# -----------------------------------------------------------------------------
# Copy mode
# -----------------------------------------------------------------------------

# Use vim keybindings in copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send -X rectangle-toggle

# -----------------------------------------------------------------------------
# Status bar (minimalist)
# -----------------------------------------------------------------------------

set -g status-bg black
set -g status-fg white
set -g status-interval 5
set -g status-left  " #S "
set -g status-right " %H:%M %d-%b "
set -g status-left-length  20
set -g status-right-length 20

# Active window highlight
setw -g window-status-current-style "bold,fg=black,bg=white"
setw -g window-status-format         " #I:#W "
setw -g window-status-current-format " #I:#W "
