# =============================================================================
# tmux configuration
# =============================================================================

# -----------------------------------------------------------------------------
# General
# -----------------------------------------------------------------------------

# Enable mouse support (clicking tabs, resizing panes)
set -g mouse on

# Increase scrollback buffer
set -g history-limit 10000

# Faster escape (important for vim/neovim)
set -sg escape-time 10

# Focus events for vim autoread
set -g focus-events on

# Renumber windows when one is closed
set -g renumber-windows on

# -----------------------------------------------------------------------------
# Display
# -----------------------------------------------------------------------------

# Use a modern terminfo so tmux negotiates mouse / color-scheme (DSR) queries
# correctly and propagates a sane TERM into SSH sessions. The old
# screen-256color entry mishandles these and leaks mouse/DSR codes as text.
set -g default-terminal "tmux-256color"
# Advertise truecolor for the outer terminal (Ghostty reports TERM=xterm-ghostty).
set -as terminal-features ",xterm-ghostty:RGB"

# Start window numbering at 1 (easier to reach keys)
set -g base-index 1
setw -g pane-base-index 1

# Set window title to current program
set -g set-titles on
set -g set-titles-string "#T"

# -----------------------------------------------------------------------------
# Key bindings
# -----------------------------------------------------------------------------

# Use Ctrl-a as prefix (easier than Ctrl-b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New windows open in current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with shift+arrow
bind -r S-Left  resize-pane -L 5
bind -r S-Right resize-pane -R 5
bind -r S-Up    resize-pane -U 5
bind -r S-Down  resize-pane -D 5

# Move windows left/right
bind < swap-window -t -1 \; select-window -t -1
bind > swap-window -t +1 \; select-window -t +1

# -----------------------------------------------------------------------------
# Copy mode
# -----------------------------------------------------------------------------

# Use vim keybindings in copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send -X rectangle-toggle

# -----------------------------------------------------------------------------
# Status bar (minimalist)
# -----------------------------------------------------------------------------

set -g status-bg black
set -g status-fg white
set -g status-interval 5
set -g status-left  " #S "
set -g status-right " %H:%M %d-%b "
set -g status-left-length  20
set -g status-right-length 20
setw -g clock-mode-colour yellow

# Dim inactive panes
set -g window-style        "fg=colour244,bg=default"
set -g window-active-style "fg=default,bg=default"

# Active window highlight
setw -g window-status-current-style "bold,fg=black,bg=white"
setw -g window-status-format         " #I:#W "
setw -g window-status-current-format " #I:#W "

# -----------------------------------------------------------------------------
# Plugins (managed by tpm — bootstrapped by nix-darwin activation script)
# -----------------------------------------------------------------------------
# First-time setup: after `darwin-rebuild switch`, start tmux and press
# `prefix + I` (Ctrl-a, then Shift-i) to install the plugins below.
# After that, sessions auto-save every 5 min and auto-restore on tmux start.

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Save visible pane contents (the buffer you can see, not full scrollback)
set -g @resurrect-capture-pane-contents 'on'
# Restore neovim sessions when a Session.vim is present
set -g @resurrect-strategy-nvim 'session'

# Auto-restore the last saved environment when tmux server starts
set -g @continuum-restore 'on'
# Save interval in minutes (default 15)
set -g @continuum-save-interval '5'

# Ghostty starts the tmux server via `bash --noprofile --norc`, so the server
# inherits a bare PATH without /opt/homebrew/bin. tpm and continuum's auto-save
# shell out to `tmux` and silently die without this.
set-environment -g PATH "/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"

# Initialize tpm — MUST be the last line in this file
run '~/.tmux/plugins/tpm/tpm'
