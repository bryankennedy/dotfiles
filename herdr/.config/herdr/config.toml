# herdr configuration — stowed from ~/src/dotfiles/herdr/.config/herdr/config.toml
# Reload without restart:  herdr server reload-config

# Skip the first-run onboarding prompt.
onboarding = false

[theme]
# Match Ghostty (ghostty-tokyonight-day). Pinned rather than auto-switching:
# dark_name/light_name below only apply when auto_switch = true.
name = "tokyo-night-day"
auto_switch = false
dark_name = "kanagawa"
light_name = "kanagawa-lotus"

[terminal]
# Empty => $SHELL (zsh). "auto" uses a login shell on macOS.
default_shell = ""
shell_mode = "auto"
# New panes inherit the source pane/workspace directory.
new_cwd = "follow"

[keys]
# ctrl+a, inherited from the tmux setup herdr replaced — Ghostty now launches
# herdr directly, so nothing else wants this chord. Remote herdr keeps herdr's
# own default (ctrl+b), set via herdr_prefix in the ansible inventory: the two
# must differ or the outer client swallows every keypress meant for the inner.
# ctrl+a = local, ctrl+b = whichever remote is focused.
prefix = "ctrl+a"

# Run lazygit in a temporary pane.
[[keys.command]]
key = "prefix+alt+g"
type = "pane"
command = "lazygit"

[ui]
# Show which agent is in each pane on the border — useful when juggling many.
show_agent_labels_on_pane_borders = true
accent = "cyan"

[ui.toast]
# Surface "agent needs attention / finished" as macOS notifications so an idle
# agent can't sit forgotten.
delivery = "system"
delay_seconds = 1

[ui.sound]
# Audible ping when a background agent changes state.
enabled = true

[ui.sound.agents]
claude = "on"
droid = "off"

[session]
# After a herdr server restart, resume agent panes back into their sessions.
resume_agents_on_restore = true

[remote]
# Layer keepalives on top of ~/.ssh/config and reuse one authenticated
# connection per attach — helps `herdr --remote` survive idle drops.
manage_ssh_config = true

[experimental]
# Required by the herdr-fleet launcher (`hf`): it runs `herdr --remote <vm>`
# inside a pane of this local herdr, which trips the nested-herdr guard
# (herdr sees HERDR_ENV=1 and refuses). The usual reason that guard exists —
# an inner herdr stealing the outer's prefix — doesn't apply here: the fleet
# attaches with `--remote-keybindings server`, and the VMs are configured with
# a distinct prefix (ctrl+b) via the ansible inventory. See docs/herdr-fleet.md.
allow_nested = true
